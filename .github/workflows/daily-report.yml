name: Daily Report

on:
  schedule:
    - cron: '55 19 * * *'
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: '18'
      - run: node report.js
        env:
          STATS_BOT_TOKEN: ${{ secrets.STATS_BOT_TOKEN }}
